<style>
:root{--bg:#ffead2;--fg:#2a1f2e;--coral:#ff5a4a;--secondary:#9e69b1;--accent:#79408d;--muted:#78677e;--card:#ffffff;--border:#d8cede}
*{box-sizing:border-box}body{margin:0;background:#ffead2;color:var(--fg);font-family:"DM Sans",sans-serif}
h1,h2,h3,.ayear,.cy,.by{font-family:"Outfit",sans-serif;margin:0;letter-spacing:-.02em}
.nav{position:sticky;top:0;z-index:50;background:#2a1f2e;color:#ffe;display:flex;gap:8px;align-items:center;padding:10px 18px}
.nav b{color:var(--coral);margin-right:6px}
.nav a{color:#ffe;text-decoration:none;font-weight:600;font-size:14px;border:1px solid #fff3;padding:5px 13px;border-radius:999px}
.nav a.d{background:var(--coral);border-color:var(--coral)}
.nav .sp{margin-left:auto}
.toggle{display:flex;border:1px solid #fff3;border-radius:999px;overflow:hidden}
.toggle button{background:transparent;color:#ffe;border:0;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
.toggle button.on{background:var(--coral);color:#fff}
.sh{max-width:1120px;margin:32px auto 8px;padding:0 22px}
.sh .n{font-family:"Outfit";font-weight:800;color:var(--coral);font-size:26px}.sh h2{font-size:22px;display:inline;margin-left:8px}
.sh p{color:var(--muted);font-size:14px;margin:6px 0 0}
.frame{max-width:1120px;margin:0 auto;padding:0 22px}.framebox{background:var(--card);border:1px solid #0001;border-radius:16px;overflow:hidden}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
figure{margin:0}figure img,.vidtile{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;background:#e7dcea;cursor:pointer;display:block}
figcaption{font-size:11px;color:var(--muted);line-height:1.35;margin-top:5px}
.vidtile{position:relative;display:flex;align-items:center;justify-content:center;background:#2a1f2e}
.vidtile .play{width:46px;height:46px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;padding-left:3px}
.vidtile .vtag{position:absolute;top:8px;right:8px;font-size:9px;letter-spacing:.1em;font-weight:700;background:#0007;color:#fff;padding:3px 6px;border-radius:5px}
.itext{color:#2a1f2e;font-size:14.5px;line-height:1.6;max-width:840px;margin:0 0 14px}.itext.sm{font-size:13px}
.isub{color:var(--coral);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.06em}
/* A */
.areel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.aslide{flex:0 0 100%;scroll-snap-align:start;padding:22px;max-height:80vh;overflow-y:auto;border-right:1px solid #0001}
.ahead{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}.ayear{font-size:30px;font-weight:800;color:var(--yc)}.atitle{font-weight:700;font-size:18px}
.ahint{text-align:center;color:var(--muted);font-size:12px;padding:10px}
/* B */
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:16px 18px 0}
.tabs button{font:inherit;font-weight:600;font-size:14px;border:1px solid #0002;background:#ffffff;color:var(--fg);padding:7px 16px;border-radius:999px;cursor:pointer}
.tabs button.on{color:#fff;border-color:transparent}
#bbody{padding:18px}.bintro{color:#2a1f2e;font-size:14px;max-width:840px;margin:2px 0 18px}.by{font-weight:800;font-size:22px}
.item{margin:0 0 26px}.ih{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.it-t{font-family:"Outfit";font-weight:700;font-size:18px}.it-n{font-size:11px;color:var(--muted)}
/* C */
.ctl{position:relative;padding:8px 18px 30px}
.ctl:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:3px;background:#d8cede;transform:translateX(-50%)}
.cyear{text-align:center;margin:24px 0 10px}.cyear .cy{font-size:28px;font-weight:800;color:var(--yc)}.cyear .cl{font-size:13px;color:var(--muted)}
.crow{display:flex;width:100%;margin:0 0 16px}.crow.r{justify-content:flex-end}
.crow .cc{width:47%;background:var(--card);border:1px solid #0001;border-top:3px solid var(--yc);border-radius:12px;padding:16px}
.crow .ct{font-family:"Outfit";font-weight:700;font-size:16px;margin-bottom:5px}
.crow .gal{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
@media(max-width:760px){.ctl:before{display:none}.crow .cc{width:100%}}
.lb{position:fixed;inset:0;background:#000e;display:none;flex-direction:column;gap:10px;align-items:center;justify-content:center;z-index:9999}
.lb.on{display:flex}.lb img,.lb video{max-width:92vw;max-height:82vh;border-radius:8px}.lb .cap{color:#fff;font-size:14px;max-width:80vw;text-align:center}
.lb .x{position:absolute;top:14px;right:22px;color:#fff;font-size:32px;cursor:pointer}
</style></head><body>

<script>
const YEARS=[{"year": "2020", "color": "#ff5a4a", "label_es": "Nuestros orígenes", "label_en": "Our beginnings", "intro_es": "En el contexto de la pandemia de COVID-19, el encuentro entre Yamil, Victoria y Pablo terminaría dando origen a Fundación Puna y a las primeras redes de trabajo colectivo junto a las comunidades de su provincia.", "intro_en": "Amid the COVID-19 pandemic, the meeting of Yamil, Victoria and Pablo would give rise to Fundación Puna and to the organization's first networks of collective work alongside the communities of its province.", "items": [{"t_es": "Susques · salud comunitaria", "t_en": "Susques · community health", "sub_es": "", "sub_en": "", "text_es": "Victoria Araya, estudiante de medicina, regresa a Jujuy y se suma como voluntaria al sistema de salud, recorriendo muchos pueblos de la Quebrada y la Puna. Allí evidencia que la urgencia no era solamente el COVID-19, sino desigualdades estructurales mucho más profundas: la falta de agua, de acceso a la educación, de conectividad y de derechos básicos.", "text_en": "Victoria Araya, a medical student, returns to Jujuy and volunteers in the health system, traveling through many villages of the Quebrada and Puna. There she sees that the emergency was not only COVID-19, but far deeper structural inequalities: the lack of water, education, connectivity and basic rights.", "photos": [{"u": "assets/2020__victoria-01.jpg", "es": "Voluntarios de salud frente al Hospital de Susques", "en": "Health volunteers in front of the Susques Hospital"}, {"u": "assets/2020__victoria-02.jpg", "es": "Victoria Araya, voluntaria de salud en la Puna", "en": "Victoria Araya, health volunteer in the Puna"}, {"u": "assets/2020__img-3788.jpg", "es": "Recorriendo los pueblos de la Quebrada y la Puna", "en": "Traveling through the villages of the Quebrada and Puna"}], "video": null}]}, {"year": "2021", "color": "#9e69b1", "label_es": "Primeros recorridos territoriales", "label_en": "First territorial journeys", "intro_es": "Con la reapertura de rutas, se organiza el primer viaje a las comunidades de la cuenca de Salinas Grandes. A partir de una colecta solidaria se reunieron útiles escolares y alimentos para recorrer siete comunidades de Jujuy en un solo fin de semana, visibilizando las desigualdades estructurales en torno al agua, la infraestructura y los derechos básicos.", "intro_en": "As the roads reopened, the first trip to the communities of the Salinas Grandes basin was organized. A solidarity drive gathered school supplies and food to visit seven communities of Jujuy in a single weekend, making visible the structural inequalities around water, infrastructure and basic rights.", "items": [{"t_es": "Santuario de Tres Pozos", "t_en": "Santuario de Tres Pozos", "sub_es": "", "sub_en": "", "text_es": "La primera parada del recorrido fue el Santuario de Tres Pozos, hogar de Verónica Chávez, quien hasta el día de hoy sigue siendo una referente para nuestra Fundación. La comunidad recibió al equipo con mate cocido y tortillas; durante la jornada se realizaron juegos, actividades recreativas y entrega de útiles escolares y regalos.", "text_en": "The first stop of the journey was the Santuario de Tres Pozos, home of Verónica Chávez, still a key reference for our Foundation today. The community welcomed the team with mate cocido and tortillas; the day was filled with games, activities and the handing out of school supplies and gifts.", "photos": [{"u": "assets/2021-santuario-de-tres-pozos-seleccion__1.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__2.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__3.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__4.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__5.jpg", "es": "Tortilla a la parrilla en Tres Pozos", "en": "Grilled tortilla at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__6.jpg", "es": "Victoria Araya con niñas de la comunidad", "en": "Victoria Araya with girls from the community"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__7.jpg", "es": "Pablo Agüero en la comunidad de Tres Pozos", "en": "Pablo Agüero in the community of Tres Pozos"}], "video": null}, {"t_es": "Rinconadillas", "t_en": "Rinconadillas", "sub_es": "", "sub_en": "", "text_es": "El viaje continuó en Rinconadillas, una comunidad especialmente significativa para Yamil Alejo: lo vio crecer, allí viven sus abuelos maternos y transcurrió gran parte de su infancia. La comunidad organizó un almuerzo colectivo y espacios de encuentro junto al equipo de Fundación Puna.", "text_en": "The journey continued in Rinconadillas, a community especially meaningful to Yamil Alejo: it watched him grow up, his maternal grandparents live there and much of his childhood took place there. The community organized a shared lunch and gatherings with the Fundación Puna team.", "photos": [{"u": "assets/2021-rinconadillas-seleccion__1.jpg", "es": "Victoria con niñas de Rinconadillas", "en": "Victoria with girls from Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__10.jpg", "es": "Llegada de Fundación Puna a Rinconadillas", "en": "Fundación Puna arrives in Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__2.jpg", "es": "Llegada de Fundación Puna a Rinconadillas", "en": "Fundación Puna arrives in Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__3.jpg", "es": "Almuerzo comunitario", "en": "Community lunch"}, {"u": "assets/2021-rinconadillas-seleccion__4.jpg", "es": "Hojas de coca", "en": "Coca leaves"}, {"u": "assets/2021-rinconadillas-seleccion__5.jpg", "es": "Partido de fútbol en las alturas", "en": "Football match in the highlands"}, {"u": "assets/2021-rinconadillas-seleccion__6.jpg", "es": "Partido de fútbol en las alturas", "en": "Football match in the highlands"}, {"u": "assets/2021-rinconadillas-seleccion__7.jpg", "es": "Paisaje llegando a Rinconadillas", "en": "Landscape on the way to Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__9.jpg", "es": "Paisaje de Rinconadillas", "en": "Rinconadillas landscape"}], "video": null}, {"t_es": "San Francisco de Alfarcito", "t_en": "San Francisco de Alfarcito", "sub_es": "", "sub_en": "", "text_es": "En Alfarcito pudimos conocer experiencias de organización vinculadas al trabajo local y al cuidado del territorio, además de recorrer espacios productivos comunitarios que mostraron otra realidad dentro de la región.", "text_en": "In Alfarcito we got to know experiences of local organizing and care for the territory, and visited community productive spaces that showed another reality within the region.", "photos": [{"u": "assets/2021-san-francisco-de-alfarcito-seleccion__4.jpg", "es": "Paisaje de Alfarcito", "en": "Alfarcito landscape"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__5.jpg", "es": "Paisaje de Alfarcito", "en": "Alfarcito landscape"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__1.jpg", "es": "Caminata por Alfarcito", "en": "Walking through Alfarcito"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__2.jpg", "es": "Alfarcito", "en": "Alfarcito"}], "video": null}, {"t_es": "Sausalito · la cuestión del agua", "t_en": "Sausalito · the water question", "sub_es": "", "sub_en": "", "text_es": "La visita a Sausalito marcó uno de los momentos más movilizantes del recorrido. La falta de acceso al agua potable atravesaba la vida cotidiana de toda la comunidad. El contraste con otras localidades evidenció las profundas desigualdades dentro de la misma región y reforzó la necesidad de incorporar la problemática del agua como uno de los ejes centrales del trabajo de Fundación Puna.", "text_en": "The visit to Sausalito was one of the most moving moments of the journey. The lack of access to drinking water shaped the daily life of the whole community. The contrast with other towns exposed the deep inequalities within the same region and reinforced the need to make water one of the central axes of Fundación Puna's work.", "photos": [{"u": "assets/2021-sausalito__whatsapp-image-2026-06-30-at-13-57-42.jpg", "es": "Voluntarios de Fundación Puna en una cena en Sausalito", "en": "Fundación Puna volunteers at a dinner in Sausalito"}, {"u": "assets/2021-sausalito__whatsapp-image-2026-06-30-at-13-56-51.jpg", "es": "Victoria Araya junto a las mujeres de la comunidad de Sausalito", "en": "Victoria Araya with the women of the Sausalito community"}], "video": {"u": "assets/videos/sausalito-agua.mp4", "es": "Mujeres de Sausalito cuentan la situación con el agua en su comunidad", "en": "Women of Sausalito describe the water situation in their community"}}, {"t_es": "Tusaquillas", "t_en": "Tusaquillas", "sub_es": "", "sub_en": "", "text_es": "En Tusaquillas, el encuentro permitió continuar fortaleciendo vínculos y conocer de cerca las dificultades cotidianas vinculadas al acceso a recursos básicos y a los espacios para las infancias.", "text_en": "In Tusaquillas, the gathering allowed us to keep strengthening bonds and to see up close the everyday difficulties tied to access to basic resources and to spaces for children.", "photos": [{"u": "assets/2021-tusaquillas-seleccion__img-0344.jpg", "es": "Merienda en Tusaquillas", "en": "Snack in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0349.jpg", "es": "Voluntarios de Fundación Puna en Tusaquillas", "en": "Fundación Puna volunteers in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0357.jpg", "es": "Entrega de donaciones en Tusaquillas", "en": "Handing out donations in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0365.jpg", "es": "Victoria Araya junto a la comunidad de Tusaquillas", "en": "Victoria Araya with the community of Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0374.jpg", "es": "Escuela de Tusaquillas", "en": "School of Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0336.jpg", "es": "Paisaje de Tusaquillas", "en": "Tusaquillas landscape"}, {"u": "assets/2021-tusaquillas-seleccion__img-0395.jpg", "es": "Victoria Araya junto a la comunidad de Tusaquillas", "en": "Victoria Araya with the community of Tusaquillas"}], "video": null}, {"t_es": "Santa Ana", "t_en": "Santa Ana", "sub_es": "", "sub_en": "", "text_es": "En Santa Ana se realizaron actividades junto a niños y familias, espacios de encuentro comunitario y entrega de útiles y materiales escolares.", "text_en": "In Santa Ana, activities were held with children and families, community gatherings and the handing out of school supplies and materials.", "photos": [{"u": "assets/2021-santa-ana-seleccion__img-0444.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0450.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0500.jpg", "es": "Voluntarios de Fundación Puna en Santa Ana", "en": "Fundación Puna volunteers in Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0434.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0429.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0509.jpg", "es": "Paisaje de Santa Ana", "en": "Santa Ana landscape"}], "video": {"u": "assets/videos/santa-ana.mp4", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}}, {"t_es": "Barrancas", "t_en": "Barrancas", "sub_es": "", "sub_en": "", "text_es": "Barrancas es la comunidad natal de Yamil Alejo y el lugar donde comenzaron las primeras redes de acompañamiento educativo durante la pandemia. El recorrido de 2021 finalizó aquí, con meriendas, juegos y espacios comunitarios que cerraron el viaje reafirmando el vínculo entre Fundación Puna y las comunidades de la región.", "text_en": "Barrancas is Yamil Alejo's home community and the place where the first educational-support networks began during the pandemic. The 2021 journey ended here, with snacks, games and community spaces that closed the trip, reaffirming the bond between Fundación Puna and the region's communities.", "photos": [{"u": "assets/2020__yamil-02.jpg", "es": "Yamil Alejo · clases de apoyo escolar (2020)", "en": "Yamil Alejo · school tutoring (2020)"}, {"u": "assets/2021-barrancas-seleccion__img-0592.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0593.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0594.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0626.jpg", "es": "Voluntarios de Fundación Puna en Barrancas", "en": "Fundación Puna volunteers in Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0527.jpg", "es": "Paisaje de Barrancas", "en": "Barrancas landscape"}, {"u": "assets/2021-barrancas-seleccion__img-0577.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0581.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0618.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}], "video": null}, {"t_es": "Rinconadillas · Ojo de Agua (fin de año)", "t_en": "Rinconadillas · Ojo de Agua (year-end)", "sub_es": "", "sub_en": "", "text_es": "Hacia finales de 2021, Fundación Puna realiza un nuevo viaje a la región. El recorrido incluyó una segunda visita a Rinconadillas y un paso por Ojo del Agua, donde el equipo conoció de cerca las dificultades vinculadas al acceso al agua: el encuentro con familias que debían recolectarla manualmente reforzó aún más la importancia de esta problemática dentro del trabajo de la fundación.", "text_en": "Toward the end of 2021, Fundación Puna made a new trip to the region. The route included a second visit to Rinconadillas and a stop at Ojo del Agua, where the team saw up close the difficulties tied to water access: meeting families who had to collect it by hand further reinforced the importance of this issue in the foundation's work.", "photos": [{"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1071.jpg", "es": "Victoria Araya y Jeremy Munson en Rinconadillas", "en": "Victoria Araya and Jeremy Munson in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1111.jpg", "es": "Victoria Araya y Jeremy Munson en Rinconadillas", "en": "Victoria Araya and Jeremy Munson in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1214.jpg", "es": "Retiro de agua en Rinconadillas", "en": "Collecting water in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1267.jpg", "es": "Actividad en Rinconadillas", "en": "Activity in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1188.jpg", "es": "Paisaje de Rinconadillas", "en": "Rinconadillas landscape"}], "video": null}]}, {"year": "2023", "color": "#79408d", "label_es": "Reforma inconstitucional", "label_en": "Unconstitutional reform", "intro_es": "Un año marcado por un fuerte conflicto social, político e institucional a partir de una reforma de la constitución provincial que restringía el derecho a la protesta y la propiedad comunitaria de la tierra. La defensa del territorio, el agua y los derechos humanos toman un rol protagónico en la Fundación.", "intro_en": "A year marked by intense social, political and institutional conflict over a provincial constitutional reform that restricted the right to protest and communal land ownership. The defense of territory, water and human rights took center stage for the Foundation.", "items": [{"t_es": "Cruce de Purmamarca · Reforma inconstitucional", "t_en": "Purmamarca crossroads · Unconstitutional reform", "sub_es": "", "sub_en": "", "text_es": "En junio de 2023, en Purmamarca, tuvo lugar uno de los episodios más significativos de la reforma inconstitucional: el corte y permanencia en la Ruta Nacional 9, que duró más de dos meses. Comunidades indígenas, docentes y trabajadores se manifestaron en defensa de sus derechos y la respuesta estatal fue represiva. Fundación Puna acompañó de cerca a muchas víctimas de la represión con apoyo económico y logístico, y dio hospedaje en Buenos Aires a integrantes del Tercer Malón de la Paz.", "text_en": "In June 2023, in Purmamarca, one of the most significant episodes of the unconstitutional reform took place: the blockade and encampment on National Route 9, which lasted more than two months. Indigenous communities, teachers and workers demonstrated in defense of their rights and the state response was repressive. Fundación Puna accompanied many victims of the repression with financial and logistical support, and hosted members of the Third Malón de la Paz in Buenos Aires.", "photos": [{"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__9b3f8a62-e2ca-4605-89c6-16b8da8b6eb8.jpg", "es": "Corte y permanencia en Purmamarca", "en": "Blockade and encampment in Purmamarca"}, {"u": "assets/2023-cruce-de-purmamarca__img-7113.jpg", "es": "Victoria Araya en la posta de salud del corte de Purmamarca", "en": "Victoria Araya at the blockade's first-aid post"}, {"u": "assets/2023-cruce-de-purmamarca__img-5171.jpg", "es": "Victoria Araya en el corte de Purmamarca", "en": "Victoria Araya at the Purmamarca blockade"}, {"u": "assets/2023-cruce-de-purmamarca__img-20230701-wa0352.jpg", "es": "Mural en la Ruta Nacional 9", "en": "Mural on National Route 9"}, {"u": "assets/2023-cruce-de-purmamarca__img-7302.jpg", "es": "Corte y permanencia en Purmamarca", "en": "Blockade and encampment in Purmamarca"}, {"u": "assets/2023-cruce-de-purmamarca__img-7309.jpg", "es": "Jeremy Munson en el corte de Purmamarca", "en": "Jeremy Munson at the Purmamarca blockade"}], "video": null}, {"t_es": "Tercer Malón de la Paz", "t_en": "Third Malón de la Paz", "sub_es": "Buenos Aires", "sub_en": "Buenos Aires", "text_es": "Más de 400 comunidades originarias se organizaron en el Tercer Malón de la Paz, una movilización histórica que recorrió más de 1.800 km desde La Quiaca hasta Buenos Aires para llevar el reclamo a la Corte Suprema de Justicia. Yamil Alejo asumió un rol de liderazgo entre los jóvenes del movimiento; Fundación Puna colaboró en la logística, la posta de salud y la visibilización nacional e internacional.", "text_en": "More than 400 Indigenous communities organized the Third Malón de la Paz, a historic mobilization that traveled over 1,800 km from La Quiaca to Buenos Aires to bring their claim to the Supreme Court of Justice. Yamil Alejo took on a leadership role among the movement's youth; Fundación Puna supported logistics, the first-aid post and national and international visibility.", "photos": [{"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0065.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0075.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0077.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-4358.jpg", "es": "Yamil Alejo en el Tercer Malón de la Paz", "en": "Yamil Alejo at the Third Malón de la Paz"}], "video": null}, {"t_es": "Verónica Chávez y James Cameron", "t_en": "Verónica Chávez and James Cameron", "sub_es": "Buenos Aires", "sub_en": "Buenos Aires", "text_es": "Con el acompañamiento de Fundación Puna, Verónica Chávez, representante de la Comunidad Santuario Tres Pozos, se reunió en Buenos Aires con el cineasta y activista ambiental James Cameron, y expuso de primera mano cómo el avance de la extracción de litio afecta los territorios, el acceso al agua y las formas de vida en la Puna. Victoria Araya participó como traductora, proyectando la voz de la comunidad a escala internacional.", "text_en": "With Fundación Puna's support, Verónica Chávez, representative of the Santuario Tres Pozos community, met in Buenos Aires with filmmaker and environmental activist James Cameron, and showed first-hand how the advance of lithium extraction affects the territories, water access and ways of life in the Puna. Victoria Araya took part as translator, projecting the community's voice on an international scale.", "photos": [{"u": "assets/2023-cameron__2.jpg", "es": "Verónica Chávez con James Cameron", "en": "Verónica Chávez with James Cameron"}, {"u": "assets/2023-cameron__1.jpg", "es": "Verónica Chávez con James Cameron", "en": "Verónica Chávez with James Cameron"}, {"u": "assets/2023-cameron__3.jpg", "es": "Reunión con Victoria Araya como traductora", "en": "Meeting with Victoria Araya as translator"}, {"u": "assets/2023-cameron__4.jpg", "es": "Verónica Chávez con Victoria Araya en Aeroparque", "en": "Verónica Chávez with Victoria Araya at Aeroparque"}, {"u": "assets/2023-cameron__5.jpg", "es": "Recorte de noticia", "en": "News clipping"}], "video": null}]}, {"year": "2024", "color": "#ff5a4a", "label_es": "Lucha, cultura y crecimiento", "label_en": "Struggle, culture and growth", "intro_es": "Una etapa de mayor consolidación que combina el trabajo territorial con la articulación política, el fortalecimiento cultural y nuevas iniciativas. La educación continúa como eje, con clases de inglés y espacios vinculados a derechos humanos.", "intro_en": "A stage of greater consolidation combining territorial work with political articulation, cultural strengthening and new initiatives. Education remains a core axis, with English classes and human-rights spaces.", "items": [{"t_es": "Salinas Grandes · redes globales", "t_en": "Salinas Grandes · global networks", "sub_es": "", "sub_en": "", "text_es": "Hacia octubre de 2024, la eurodiputada Carola Rackete y la actriz y activista serbia Bojana Novakovic recorren la región y se vinculan con las comunidades en el marco de sus agendas de activismo ambiental. Su presencia aporta visibilidad y un gesto de acompañamiento que refuerza la importancia de las redes globales en la defensa del territorio.", "text_en": "Around October 2024, MEP Carola Rackete and the Serbian actress and activist Bojana Novakovic tour the region and connect with the communities as part of their environmental-activism agendas. Their presence brings visibility and a gesture of solidarity that reinforces the importance of global networks in defending the territory.", "photos": [{"u": "assets/2024-carola-y-bojana__img-7781.jpg", "es": "Victoria Araya y Verónica Chávez con Bojana Novakovic en las Salinas", "en": "Victoria Araya and Verónica Chávez with Bojana Novakovic at the Salinas"}, {"u": "assets/2024-carola-y-bojana__img-7737.jpg", "es": "Fundación Puna con Carola Rackete, Bojana Novakovic y miembros en la Cuenca de Salinas Grandes", "en": "Fundación Puna with Carola Rackete, Bojana Novakovic and members in the Salinas Grandes basin"}, {"u": "assets/2024-carola-y-bojana__img-7839.jpg", "es": "Salinas Grandes", "en": "Salinas Grandes"}], "video": null}]}, {"year": "2025", "color": "#9e69b1", "label_es": "Expansión y articulación internacional", "label_en": "International expansion and alliances", "intro_es": "El año de la proyección internacional y la intervención judicial. La Fundación llevó reclamos socioambientales al Parlamento Europeo y sumó alianzas clave con organismos de derechos humanos como el SERPAJ, mientras diversificaba el trabajo territorial hacia la salud comunitaria y la universidad pública.", "intro_en": "The year of international projection and judicial intervention. The Foundation brought socio-environmental claims to the European Parliament and forged key alliances with human-rights bodies such as SERPAJ, while diversifying territorial work toward community health and the public university.", "items": [{"t_es": "Cumbre de Energías Limpias · Parlamento Europeo", "t_en": "Clean Energy Summit · European Parliament", "sub_es": "Bruselas, Europa", "sub_en": "Brussels, Europe", "text_es": "Fundación Puna gestionó la participación de referentes comunitarios en una cumbre sobre energías limpias en el Parlamento Europeo: Verónica Chávez (Salinas Grandes, Jujuy), Ñushpi Quilla Mayhuay Alancay (Malargüe, Mendoza) y Sergio Martínez (Andalgalá). Cada uno llevó una realidad distinta atravesada por un mismo eje: la defensa del agua y del territorio frente al avance extractivo, poniendo en tensión el discurso de las energías 'limpias' y sus impactos concretos.", "text_en": "Fundación Puna arranged the participation of community leaders in a clean-energy summit at the European Parliament: Verónica Chávez (Salinas Grandes, Jujuy), Ñushpi Quilla Mayhuay Alancay (Malargüe, Mendoza) and Sergio Martínez (Andalgalá). Each brought a distinct reality tied to a shared axis: the defense of water and territory against extractive expansion, challenging the discourse of 'clean' energy and its concrete impacts.", "photos": [{"u": "assets/2025__img-1995.jpg", "es": "Ñushpi y Victoria en el Parlamento Europeo", "en": "Ñushpi and Victoria at the European Parliament"}, {"u": "assets/2025__img-1978.jpg", "es": "Ñushpi, Verónica y Victoria en el Parlamento Europeo con Carola Rackete", "en": "Ñushpi, Verónica and Victoria at the European Parliament with Carola Rackete"}, {"u": "assets/2025__img-1963.jpg", "es": "Verónica y Victoria en el Parlamento Europeo", "en": "Verónica and Victoria at the European Parliament"}, {"u": "assets/2025__img-1926.jpg", "es": "Ñushpi, Verónica y Victoria en Europa", "en": "Ñushpi, Verónica and Victoria in Europe"}, {"u": "assets/2025__img-0686.jpg", "es": "Victoria y Jeremy con Verónica en Europa", "en": "Victoria and Jeremy with Verónica in Europe"}], "video": null}, {"t_es": "Alianza con el SERPAJ", "t_en": "Alliance with SERPAJ", "sub_es": "Buenos Aires", "sub_en": "Buenos Aires", "text_es": "Fundación Puna firmó un convenio de trabajo con el Servicio Paz y Justicia (SERPAJ), organización fundada por Adolfo Pérez Esquivel, fortaleciendo la cooperación en conflictos territoriales y consolidando un perfil más internacionalista.", "text_en": "Fundación Puna signed a working agreement with Servicio Paz y Justicia (SERPAJ), the organization founded by Adolfo Pérez Esquivel, strengthening cooperation on territorial conflicts and consolidating a more internationalist profile.", "photos": [{"u": "assets/2025__img-3912.jpg", "es": "Victoria Araya con Adolfo Pérez Esquivel", "en": "Victoria Araya with Adolfo Pérez Esquivel"}, {"u": "assets/2025__img-3846.jpg", "es": "Victoria Araya con los miembros del SERPAJ", "en": "Victoria Araya with the members of SERPAJ"}, {"u": "assets/2025__img-3923.jpg", "es": "Firma del convenio entre Fundación Puna y SERPAJ", "en": "Signing of the agreement between Fundación Puna and SERPAJ"}], "video": null}]}];
let LANG='es', activeYear=YEARS[0].year;
const lb=document.getElementById('lb'),lbmedia=document.getElementById('lbmedia'),lbcap=document.getElementById('lbcap');
function openImg(u,c){lbmedia.innerHTML=`<img src="${u}">`;lbcap.textContent=c;lb.classList.add('on');}
function openVid(u,c){lbmedia.innerHTML=`<video src="${u}" autoplay controls playsinline></video>`;lbcap.textContent=c;lb.classList.add('on');}
function closeLb(){lb.classList.remove('on');lbmedia.innerHTML='';}
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
const esc=s=>s.replace(/'/g,"\\'");
function figImg(p){return `<figure><img loading="lazy" src="${p.u}" onclick="openImg('${p.u}',this.nextElementSibling.textContent)"><figcaption>${p[LANG]}</figcaption></figure>`;}
function figVid(v){return `<figure><div class="vidtile" onclick="openVid('${v.u}','${esc(v[LANG])}')"><div class="play">▶</div><span class="vtag">VIDEO</span></div><figcaption>${v[LANG]}</figcaption></figure>`;}
function gallery(it){return '<div class="gal">'+(it.video?figVid(it.video):'')+it.photos.map(figImg).join('')+'</div>';}
function itemCount(it){return it.photos.length+(it.video?1:0);}

function renderA(){
  const el=document.getElementById('areel');
  el.innerHTML=YEARS.flatMap(y=>y.items.map(it=>
    `<div class="aslide" style="--yc:${y.color}"><div class="ahead"><div class="ayear">${y.year}</div>`+
    `<div class="atitle">${it['t_'+LANG]}</div></div>`+
    (it['sub_'+LANG]?`<div class="isub">${it['sub_'+LANG]}</div>`:'')+
    `<p class="itext">${it['text_'+LANG]}</p>${gallery(it)}</div>`)).join('');
}
function renderBTabs(){
  document.getElementById('btabs').innerHTML=YEARS.map(y=>
    `<button data-y="${y.year}" style="--yc:${y.color};${y.year===activeYear?`background:${y.color};color:#fff;border-color:transparent`:''}" class="${y.year===activeYear?'on':''}">${y.year}</button>`).join('');
  document.querySelectorAll('#btabs button').forEach(b=>b.onclick=()=>{activeYear=b.dataset.y;renderBTabs();renderBBody();});
}
function renderBBody(){
  const y=YEARS.find(x=>x.year===activeYear);
  document.getElementById('bbody').innerHTML=
    `<div class="by" style="color:${y.color}">${y.year} · ${y['label_'+LANG]}</div><p class="bintro">${y['intro_'+LANG]||''}</p>`+
    y.items.map(it=>`<div class="item"><div class="ih"><span class="it-t">${it['t_'+LANG]}</span>`+
      (it['sub_'+LANG]?`<span class="isub">${it['sub_'+LANG]}</span>`:'')+
      `<span class="it-n">${itemCount(it)} ${LANG==='es'?'fotos':'photos'}</span></div>`+
      `<p class="itext">${it['text_'+LANG]}</p>${gallery(it)}</div>`).join('');
}
function renderC(){
  let side=0;
  document.getElementById('ctl').innerHTML=YEARS.map(y=>
    `<div class="cyear" style="--yc:${y.color}"><div class="cy">${y.year}</div><div class="cl">${y['label_'+LANG]}</div></div>`+
    y.items.map(it=>{const cls=(side++%2)?'r':'l';
      return `<div class="crow ${cls}" style="--yc:${y.color}"><div class="cc"><div class="ct">${it['t_'+LANG]}</div>`+
        (it['sub_'+LANG]?`<div class="isub">${it['sub_'+LANG]}</div>`:'')+
        `<p class="itext sm">${it['text_'+LANG]}</p>${gallery(it)}</div></div>`;}).join('')
  ).join('');
}
function renderAll(){renderA();renderBTabs();renderBBody();renderC();}
function setLang(l){LANG=l;document.documentElement.lang=l;
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v!==null)el.textContent=v;});
  document.querySelectorAll('.toggle button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  renderAll();
}
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
renderAll();
</script></body></html>
