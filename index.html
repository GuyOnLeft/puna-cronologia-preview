<!doctype html><html lang="es"><head><meta charset="utf-8">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffead2;--fg:#2a1f2e;--coral:#ff5a4a;--secondary:#9e69b1;--accent:#79408d;--muted:#78677e;--card:#ffffff;--border:#d8cede;--yc:#ff5a4a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:"DM Sans",sans-serif;line-height:1.55}
h1,h2,h3,.ynum{font-family:"Outfit",sans-serif;margin:0;letter-spacing:-.02em}
a{color:inherit}
.nav{position:sticky;top:0;z-index:60;background:#2a1f2e;color:#fff;display:flex;align-items:center;gap:12px;padding:11px 20px}
.nav b{color:var(--coral)}.nav .sp{margin-left:auto}
.nav a.map{font-size:13px;text-decoration:none;border:1px solid #fff3;padding:5px 13px;border-radius:999px}
.toggle{display:flex;border:1px solid #fff3;border-radius:999px;overflow:hidden}
.toggle button{background:transparent;color:#fff;border:0;padding:5px 12px;font:inherit;font-size:12px;cursor:pointer}
.toggle button.on{background:var(--coral);color:#fff}
.hero{text-align:center;padding:54px 22px 26px}
.hero .eyebrow{text-transform:uppercase;letter-spacing:.22em;font-size:12px;color:var(--muted)}
.hero h1{font-size:clamp(40px,7vw,64px);font-weight:800;margin:8px 0 0}
.hero p{color:var(--muted);max-width:640px;margin:14px auto 0;font-size:17px}
.tabs{position:sticky;top:46px;z-index:55;background:var(--bg);display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--border)}
.tabs button{font:inherit;font-weight:700;font-size:15px;border:1px solid var(--border);background:var(--card);color:var(--fg);padding:8px 20px;border-radius:999px;cursor:pointer}
.ybody{max-width:1180px;margin:0 auto;padding:30px 22px 80px}
.yhead{display:flex;align-items:baseline;gap:14px;margin:6px 0 6px}
.yhead .ynum{font-size:clamp(40px,7vw,72px);font-weight:800;color:var(--yc)}
.yhead .ylabel{font-size:clamp(18px,2.3vw,26px);font-weight:600}
.yintro{color:var(--fg);opacity:.85;max-width:820px;font-size:16px;margin:0 0 30px}
.chapter{display:grid;grid-template-columns:0.82fr 1.18fr;gap:30px;align-items:start;margin:0 0 46px;padding-top:30px;border-top:1px solid var(--border)}
.chapter:first-of-type{border-top:0;padding-top:6px}
.isub{color:var(--yc);font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.07em}
.chapter h3{font-size:24px;margin:6px 0 12px}
.chapter .txt p{color:var(--fg);opacity:.9;font-size:15.5px;margin:0 0 14px}
.vid{margin-top:12px}.vid video{width:100%;border-radius:12px;display:block;background:#2a1f2e}
.vid .vcap{font-size:12px;color:var(--muted);margin-top:6px}
.carousel{position:relative;border-radius:16px;overflow:hidden;background:#2a1f2e;box-shadow:0 20px 50px -30px #0007}
.track{display:flex;transition:transform .5s cubic-bezier(.22,.61,.36,1)}
.slide{min-width:100%;max-width:100%;margin:0;flex:0 0 100%;position:relative}
.slide img{width:100%;height:min(60vh,480px);object-fit:contain;background:#2a1f2e;display:block}
.cbtn{position:absolute;top:50%;transform:translateY(-50%);background:#2a1f2ee6;color:#fff;border:0;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;opacity:.85;transition:.2s}
.cbtn:hover{opacity:1}.prev{left:12px}.next{right:12px}
.cbar{display:flex;justify-content:flex-end;margin-top:10px}
.ccounter{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
@media(max-width:820px){.chapter{grid-template-columns:1fr;gap:16px}.slide img{height:52vh}}
.chapter.solo{grid-template-columns:1fr;max-width:860px}
.soon{padding:16px 0 46px}
.soon-badge{display:inline-block;color:#fff;font-weight:700;font-size:13px;padding:8px 18px;border-radius:999px;letter-spacing:.06em;text-transform:uppercase}
.mlinks{margin:0 0 14px;display:grid;gap:6px}
.mlinks-h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--yc);font-weight:700}
.mlink{color:var(--yc);text-decoration:none;font-size:14px;font-weight:600;line-height:1.4}
.mlink:hover{text-decoration:underline}
.mlsrc{color:var(--muted);font-weight:400;font-size:12px}
.foot{background:#2a1f2e;color:#ffffffaa;text-align:center;padding:26px;font-size:13px}
</style></head><body>

<div class="foot" data-es="Vista previa de diseño · Fundación Puna" data-en="Design preview · Fundación Puna">Vista previa · Fundación Puna</div>
<script>
const YEARS=[{"year": "2020", "color": "#ff5a4a", "label_es": "Nuestros orígenes", "label_en": "Our beginnings", "intro_es": "En el contexto de la pandemia de COVID-19, el encuentro entre Yamil, Victoria y Pablo terminaría dando origen a Fundación Puna y a las primeras redes de trabajo colectivo de la organización junto a las comunidades de su provincia.", "intro_en": "Amid the COVID-19 pandemic, the meeting of Yamil, Victoria and Pablo would give rise to Fundación Puna and to the organization's first networks of collective work alongside the communities of its province.", "items": [{"t_es": "Apoyo educativo durante la pandemia", "t_en": "Educational support during the pandemic", "sub_es": "", "sub_en": "", "text_es": "Durante la pandemia, Yamil Alejo, un joven estudiante de ingeniería oriundo de Barrancas, regresa a su comunidad y detecta una problemática urgente: la falta de conectividad estaba dejando a muchos niños y jóvenes fuera del sistema educativo. Frente a esa realidad, comienza a organizar clases de apoyo y acompañamiento escolar utilizando los recursos que tenía a mano —celulares, cuadernos y espacios comunitarios— para sostener redes educativas y que muchos estudiantes pudieran continuar aprendiendo en medio del aislamiento.", "text_en": "During the pandemic, Yamil Alejo, a young engineering student from Barrancas, returns to his community and spots an urgent problem: the lack of connectivity was leaving many children and youth outside the school system. In response, he begins organizing tutoring and school support using whatever was at hand —phones, notebooks and community spaces— to sustain learning networks so that many students could keep learning through the isolation.", "photos": [{"u": "assets/2020__yamil-01.jpg", "es": "Nota periodística sobre las clases de apoyo de Yamil", "en": "News feature on Yamil's tutoring"}, {"u": "assets/2020__yamil-02.jpg", "es": "Clases de apoyo escolar durante el aislamiento", "en": "School tutoring during the isolation"}], "video": null, "loc": {"lat": -23.2, "lon": -65.95, "es": "Barrancas, Jujuy", "en": "Barrancas, Jujuy"}}, {"t_es": "Salud y territorio durante la pandemia", "t_en": "Health and territory during the pandemic", "sub_es": "", "sub_en": "", "text_es": "En ese mismo contexto, Victoria Araya, una estudiante de medicina, decide regresar a Jujuy con la intención de reconectar con sus orígenes. Al volver, se suma como voluntaria al sistema de salud, donde recorre muchos pueblos de la Quebrada y la Puna jujeña. A través de esa experiencia comienza a evidenciar que la urgencia no era solamente el COVID-19, sino también desigualdades estructurales mucho más profundas: la falta de agua, de acceso a la educación, de conectividad y de derechos básicos en muchas comunidades de la provincia.", "text_en": "In that same context, Victoria Araya, a medical student, decides to return to Jujuy to reconnect with her roots. Back home, she volunteers in the health system, traveling through many villages of the Quebrada and the Jujuy Puna. Through that experience she begins to see that the emergency was not only COVID-19, but far deeper structural inequalities: the lack of water, education, connectivity and basic rights in many communities of the province.", "photos": [{"u": "assets/2020__img-3788.jpg", "es": "Victoria Araya recorriendo los pueblos de la Quebrada y la Puna", "en": "Victoria Araya visiting the villages of the Quebrada and Puna"}, {"u": "assets/2020__victoria-01.jpg", "es": "Voluntarios de salud frente al Hospital de Susques", "en": "Health volunteers in front of the Susques Hospital"}, {"u": "assets/2020__victoria-02.jpg", "es": "Victoria Araya, voluntaria de salud en la Puna", "en": "Victoria Araya, health volunteer in the Puna"}], "video": null, "loc": {"lat": -23.42, "lon": -66.57, "es": "Susques, Jujuy", "en": "Susques, Jujuy"}}, {"t_es": "El encuentro entre Victoria, Yamil y Pablo", "t_en": "The meeting of Victoria, Yamil and Pablo", "sub_es": "", "sub_en": "", "text_es": "En 2020, en medio de la pandemia, los caminos de Victoria Araya, Yamil Alejo y Pablo Agüero se cruzan a partir de las iniciativas comunitarias que cada uno venía impulsando por separado en Jujuy. El encuentro entre los tres permitió unir fuerzas, miradas y formas de organización que terminarían dando origen a Fundación Puna. Desde entonces, Victoria, Yamil y Pablo continúan integrando la organización como sus miembros fundadores.", "text_en": "In 2020, mid-pandemic, the paths of Victoria Araya, Yamil Alejo and Pablo Agüero cross through the community initiatives each had been driving separately in Jujuy. Their meeting joined forces, perspectives and ways of organizing that would give rise to Fundación Puna. Since then, Victoria, Yamil and Pablo remain part of the organization as its founding members.", "photos": [{"u": "assets/2020__victoria-03.jpg", "es": "Victoria, Yamil y Pablo — miembros fundadores de Fundación Puna", "en": "Victoria, Yamil and Pablo — founding members of Fundación Puna"}], "video": null}]}, {"year": "2021", "color": "#7ba551", "label_es": "Primeros recorridos territoriales", "label_en": "First territorial journeys", "intro_es": "Con la reapertura de rutas, se organiza el primer viaje a las comunidades de la cuenca de Salinas Grandes. A partir de una colecta solidaria se reunieron útiles escolares y alimentos para recorrer siete comunidades de Jujuy en un solo fin de semana, visibilizando las desigualdades estructurales en torno al agua, la infraestructura y los derechos básicos.", "intro_en": "As the roads reopened, the first trip to the communities of the Salinas Grandes basin was organized. A solidarity drive gathered school supplies and food to visit seven communities of Jujuy in a single weekend, making visible the structural inequalities around water, infrastructure and basic rights.", "items": [{"t_es": "Organización colectiva", "t_en": "Collective organizing", "sub_es": "", "sub_en": "", "text_es": "Antes del viaje, Fundación Puna impulsa una colecta junto a voluntarios, familias y redes cercanas. Olga Cabrera, anciana originaria del pueblo de Volcán y abuela de Victoria Araya, tuvo un rol fundamental sugiriendo ideas y ayudando a armar cada bolsita con útiles, golosinas y materiales destinados a los niños de cada comunidad. Ese trabajo, sostenido desde el cuidado y la dedicación, también formó parte del espíritu colectivo de Puna.", "text_en": "Before the trip, Fundación Puna runs a collection with volunteers, families and close networks. Olga Cabrera —an elder from the town of Volcán and Victoria Araya's grandmother— played a key role suggesting ideas and helping assemble each bag of supplies, treats and materials for the children of every community. That work, grounded in care and dedication, was also part of Puna's collective spirit.", "photos": [{"u": "assets/2021-pre-viaje-a-la-puna-seleccion-de-fotos__img-9677.jpg", "es": "Donaciones recolectadas", "en": "Donations gathered"}, {"u": "assets/2021-pre-viaje-a-la-puna-seleccion-de-fotos__img-9680.jpg", "es": "Victoria y Olga preparando todo para el viaje", "en": "Victoria and Olga getting everything ready for the trip"}, {"u": "assets/2021-pre-viaje-a-la-puna-seleccion-de-fotos__img-9696.jpg", "es": "Olga limpiando y ordenando donaciones", "en": "Olga cleaning and sorting the donations"}], "video": null, "loc": {"lat": -23.92, "lon": -65.47, "es": "Volcán, Jujuy", "en": "Volcán, Jujuy"}}, {"t_es": "Santuario de Tres Pozos", "t_en": "Santuario de Tres Pozos", "sub_es": "", "sub_en": "", "text_es": "La primera parada del recorrido fue el Santuario de Tres Pozos, hogar de Verónica Chávez, quien hasta el día de hoy sigue siendo una referente para nuestra Fundación. La comunidad recibió al equipo con mate cocido y tortillas; durante la jornada se realizaron juegos, actividades recreativas y entrega de útiles escolares y regalos.", "text_en": "The first stop of the journey was the Santuario de Tres Pozos, home of Verónica Chávez, still a key reference for our Foundation today. The community welcomed the team with mate cocido and tortillas; the day was filled with games, activities and the handing out of school supplies and gifts.", "photos": [{"u": "assets/2021-santuario-de-tres-pozos-seleccion__1.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__2.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__3.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__4.jpg", "es": "Merienda en Tres Pozos", "en": "Afternoon snack at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__5.jpg", "es": "Tortilla a la parrilla en Tres Pozos", "en": "Grilled tortilla at Tres Pozos"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__6.jpg", "es": "Victoria Araya con niñas de la comunidad", "en": "Victoria Araya with girls from the community"}, {"u": "assets/2021-santuario-de-tres-pozos-seleccion__7.jpg", "es": "Pablo Agüero en la comunidad de Tres Pozos", "en": "Pablo Agüero in the community of Tres Pozos"}], "video": null, "loc": {"lat": -23.63, "lon": -65.75, "es": "Santuario de Tres Pozos, Jujuy", "en": "Santuario de Tres Pozos, Jujuy"}}, {"t_es": "Rinconadillas", "t_en": "Rinconadillas", "sub_es": "", "sub_en": "", "text_es": "El viaje continuó en Rinconadillas, una comunidad especialmente significativa para Yamil Alejo: lo vio crecer, allí viven sus abuelos maternos y transcurrió gran parte de su infancia. La comunidad organizó un almuerzo colectivo y espacios de encuentro junto al equipo de Fundación Puna.", "text_en": "The journey continued in Rinconadillas, a community especially meaningful to Yamil Alejo: it watched him grow up, his maternal grandparents live there and much of his childhood took place there. The community organized a shared lunch and gatherings with the Fundación Puna team.", "photos": [{"u": "assets/2021-rinconadillas-seleccion__1.jpg", "es": "Victoria con niñas de Rinconadillas", "en": "Victoria with girls from Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__10.jpg", "es": "Llegada de Fundación Puna a Rinconadillas", "en": "Fundación Puna arrives in Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__2.jpg", "es": "Llegada de Fundación Puna a Rinconadillas", "en": "Fundación Puna arrives in Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__3.jpg", "es": "Almuerzo comunitario", "en": "Community lunch"}, {"u": "assets/2021-rinconadillas-seleccion__4.jpg", "es": "Hojas de coca", "en": "Coca leaves"}, {"u": "assets/2021-rinconadillas-seleccion__5.jpg", "es": "Partido de fútbol en las alturas", "en": "Football match in the highlands"}, {"u": "assets/2021-rinconadillas-seleccion__6.jpg", "es": "Partido de fútbol en las alturas", "en": "Football match in the highlands"}, {"u": "assets/2021-rinconadillas-seleccion__7.jpg", "es": "Paisaje llegando a Rinconadillas", "en": "Landscape on the way to Rinconadillas"}, {"u": "assets/2021-rinconadillas-seleccion__9.jpg", "es": "Paisaje de Rinconadillas", "en": "Rinconadillas landscape"}], "video": null, "loc": {"lat": -23.66, "lon": -65.7, "es": "Rinconadillas, Jujuy", "en": "Rinconadillas, Jujuy"}}, {"t_es": "San Francisco de Alfarcito", "t_en": "San Francisco de Alfarcito", "sub_es": "", "sub_en": "", "text_es": "En Alfarcito pudimos conocer experiencias de organización vinculadas al trabajo local y al cuidado del territorio, además de recorrer espacios productivos comunitarios que mostraron otra realidad dentro de la región.", "text_en": "In Alfarcito we got to know experiences of local organizing and care for the territory, and visited community productive spaces that showed another reality within the region.", "photos": [{"u": "assets/2021-san-francisco-de-alfarcito-seleccion__4.jpg", "es": "Paisaje de Alfarcito", "en": "Alfarcito landscape"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__5.jpg", "es": "Paisaje de Alfarcito", "en": "Alfarcito landscape"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__1.jpg", "es": "Caminata por Alfarcito", "en": "Walking through Alfarcito"}, {"u": "assets/2021-san-francisco-de-alfarcito-seleccion__2.jpg", "es": "Alfarcito", "en": "Alfarcito"}], "video": null, "loc": {"lat": -23.83, "lon": -65.5, "es": "San Francisco de Alfarcito, Jujuy", "en": "San Francisco de Alfarcito, Jujuy"}}, {"t_es": "Sausalito · la cuestión del agua", "t_en": "Sausalito · the water question", "sub_es": "", "sub_en": "", "text_es": "La visita a Sausalito marcó uno de los momentos más movilizantes del recorrido. La falta de acceso al agua potable atravesaba la vida cotidiana de toda la comunidad. El contraste con otras localidades evidenció las profundas desigualdades dentro de la misma región y reforzó la necesidad de incorporar la problemática del agua como uno de los ejes centrales del trabajo de Fundación Puna.", "text_en": "The visit to Sausalito was one of the most moving moments of the journey. The lack of access to drinking water shaped the daily life of the whole community. The contrast with other towns exposed the deep inequalities within the same region and reinforced the need to make water one of the central axes of Fundación Puna's work.", "photos": [{"u": "assets/2021-sausalito__whatsapp-image-2026-06-30-at-13-57-42.jpg", "es": "Voluntarios de Fundación Puna en una cena en Sausalito", "en": "Fundación Puna volunteers at a dinner in Sausalito"}, {"u": "assets/2021-sausalito__whatsapp-image-2026-06-30-at-13-56-51.jpg", "es": "Victoria Araya junto a las mujeres de la comunidad de Sausalito", "en": "Victoria Araya with the women of the Sausalito community"}], "video": {"u": "assets/videos/sausalito-agua.mp4", "es": "Mujeres de Sausalito cuentan la situación con el agua en su comunidad", "en": "Women of Sausalito describe the water situation in their community"}, "loc": {"lat": -23.55, "lon": -65.72, "es": "Sausalito, Jujuy", "en": "Sausalito, Jujuy"}}, {"t_es": "Tusaquillas", "t_en": "Tusaquillas", "sub_es": "", "sub_en": "", "text_es": "En Tusaquillas, el encuentro permitió continuar fortaleciendo vínculos y conocer de cerca las dificultades cotidianas vinculadas al acceso a recursos básicos y a los espacios para las infancias.", "text_en": "In Tusaquillas, the gathering allowed us to keep strengthening bonds and to see up close the everyday difficulties tied to access to basic resources and to spaces for children.", "photos": [{"u": "assets/2021-tusaquillas-seleccion__img-0344.jpg", "es": "Merienda en Tusaquillas", "en": "Snack in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0349.jpg", "es": "Voluntarios de Fundación Puna en Tusaquillas", "en": "Fundación Puna volunteers in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0357.jpg", "es": "Entrega de donaciones en Tusaquillas", "en": "Handing out donations in Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0365.jpg", "es": "Victoria Araya junto a la comunidad de Tusaquillas", "en": "Victoria Araya with the community of Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0374.jpg", "es": "Escuela de Tusaquillas", "en": "School of Tusaquillas"}, {"u": "assets/2021-tusaquillas-seleccion__img-0336.jpg", "es": "Paisaje de Tusaquillas", "en": "Tusaquillas landscape"}, {"u": "assets/2021-tusaquillas-seleccion__img-0395.jpg", "es": "Victoria Araya junto a la comunidad de Tusaquillas", "en": "Victoria Araya with the community of Tusaquillas"}], "video": null, "loc": {"lat": -22.95, "lon": -65.95, "es": "Tusaquillas, Jujuy", "en": "Tusaquillas, Jujuy"}}, {"t_es": "Santa Ana", "t_en": "Santa Ana", "sub_es": "", "sub_en": "", "text_es": "En Santa Ana se realizaron actividades junto a niños y familias, espacios de encuentro comunitario y entrega de útiles y materiales escolares.", "text_en": "In Santa Ana, activities were held with children and families, community gatherings and the handing out of school supplies and materials.", "photos": [{"u": "assets/2021-santa-ana-seleccion__img-0444.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0450.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0500.jpg", "es": "Voluntarios de Fundación Puna en Santa Ana", "en": "Fundación Puna volunteers in Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0434.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0429.jpg", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, {"u": "assets/2021-santa-ana-seleccion__img-0509.jpg", "es": "Paisaje de Santa Ana", "en": "Santa Ana landscape"}], "video": {"u": "assets/videos/santa-ana.mp4", "es": "Actividad en la comunidad de Santa Ana", "en": "Activity in the community of Santa Ana"}, "loc": {"lat": -23.33, "lon": -65.3, "es": "Santa Ana, Jujuy", "en": "Santa Ana, Jujuy"}}, {"t_es": "Barrancas", "t_en": "Barrancas", "sub_es": "", "sub_en": "", "text_es": "El recorrido finalizó en Barrancas, comunidad natal de Yamil Alejo y lugar donde habían comenzado las primeras redes de acompañamiento educativo durante la pandemia. La jornada incluyó meriendas, juegos y espacios comunitarios que cerraron el viaje reafirmando el vínculo entre Fundación Puna y las comunidades de la región.", "text_en": "The route ended in Barrancas, Yamil Alejo's home community and the place where the first educational-support networks had begun during the pandemic. The day included snacks, games and community spaces that closed the trip, reaffirming the bond between Fundación Puna and the region's communities.", "photos": [{"u": "assets/2021-barrancas-seleccion__img-0592.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0593.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0594.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0626.jpg", "es": "Voluntarios de Fundación Puna en Barrancas", "en": "Fundación Puna volunteers in Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0527.jpg", "es": "Paisaje de Barrancas", "en": "Barrancas landscape"}, {"u": "assets/2021-barrancas-seleccion__img-0577.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0581.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}, {"u": "assets/2021-barrancas-seleccion__img-0618.jpg", "es": "Actividad en la comunidad de Barrancas", "en": "Activity in the community of Barrancas"}], "video": null, "loc": {"lat": -23.2, "lon": -65.95, "es": "Barrancas, Jujuy", "en": "Barrancas, Jujuy"}}, {"t_es": "Regreso a Rinconadillas y Ojo de Agua", "t_en": "Return to Rinconadillas and Ojo de Agua", "sub_es": "", "sub_en": "", "text_es": "Hacia finales de 2021, Fundación Puna realiza un nuevo viaje a la región, fortaleciendo los vínculos construidos durante los primeros recorridos. El viaje incluyó una segunda visita a Rinconadillas y un recorrido por Ojo del Agua, donde el equipo conoció de cerca las dificultades cotidianas vinculadas al acceso al agua. El encuentro con familias que debían recolectarla manualmente reforzó aún más la importancia de esta problemática dentro del trabajo de la fundación.", "text_en": "Toward the end of 2021, Fundación Puna made a new trip to the region, strengthening the bonds built during the first journeys. The trip included a second visit to Rinconadillas and a stop at Ojo del Agua, where the team saw up close the everyday difficulties tied to water access. Meeting families who had to collect it by hand further reinforced the importance of this issue in the foundation's work.", "photos": [{"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1071.jpg", "es": "Victoria Araya y Jeremy Munson en Rinconadillas", "en": "Victoria Araya and Jeremy Munson in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1111.jpg", "es": "Victoria Araya y Jeremy Munson en Rinconadillas", "en": "Victoria Araya and Jeremy Munson in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1224.jpg", "es": "Victoria Araya y Jeremy Munson en Rinconadillas", "en": "Victoria Araya and Jeremy Munson in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1214.jpg", "es": "Retiro de agua en Rinconadillas", "en": "Collecting water in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1267.jpg", "es": "Actividad en Rinconadillas", "en": "Activity in Rinconadillas"}, {"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-1188.jpg", "es": "Paisaje de Rinconadillas", "en": "Rinconadillas landscape"}], "video": null, "loc": {"lat": -23.66, "lon": -65.7, "es": "Rinconadillas · Ojo de Agua, Jujuy", "en": "Rinconadillas · Ojo de Agua, Jujuy"}}, {"t_es": "Clases de inglés online", "t_en": "Online English classes", "sub_es": "", "sub_en": "", "text_es": "En esta etapa se suma como miembro Jeremy Munson, quien comienza a colaborar impulsando clases de inglés para jóvenes de las comunidades con las que Fundación Puna trabaja.", "text_en": "In this period Jeremy Munson joins as a member, beginning to collaborate by driving English classes for youth in the communities Fundación Puna works with.", "photos": [{"u": "assets/2021-rinconadillas-la-vuelta-fin-de-ano-seleccion__img-8734.jpg", "es": "Victoria Araya y Jeremy Munson — clases de inglés online", "en": "Victoria Araya and Jeremy Munson — online English classes"}], "video": null}]}, {"year": "2022", "color": "#ff914d", "label_es": "Un año de consolidación", "label_en": "A year of consolidation", "intro_es": "La Fundación se enfoca en fortalecer su identidad. Con el aporte de Lorenzo Ramicone se desarrolla el logotipo y la identidad visual. Se sostienen las acciones educativas a distancia y la difusión de las problemáticas de las comunidades de la Puna: un año de base para ordenar y proyectar a futuro.", "intro_en": "The Foundation focuses on strengthening its identity. With Lorenzo Ramicone's contribution, the logo and visual identity take shape. Remote education and outreach about the Puna communities' struggles continue — a foundational year to organize and look ahead.", "items": [{"t_es": "Identidad visual", "t_en": "Visual identity", "sub_es": "", "sub_en": "", "text_es": "Durante este año la Fundación se enfocó en fortalecer su identidad. Con el aporte de Lorenzo Ramicone se desarrolla el logotipo y la identidad visual, dando forma a una imagen más clara y coherente. A la par, se sostienen las acciones educativas a distancia y la difusión de las problemáticas que atraviesan las comunidades de la Puna. Así, 2022 se vuelve un año de base para ordenar y proyectar a futuro.", "text_en": "During this year the Foundation focused on strengthening its identity. With Lorenzo Ramicone's contribution, the logo and visual identity are developed, giving shape to a clearer, more coherent image. In parallel, remote education and outreach about the Puna communities' struggles continue. Thus 2022 becomes a foundational year to organize and project into the future.", "photos": [{"u": "assets/2022__victoria-y-yamil.jpg", "es": "Victoria y Yamil", "en": "Victoria and Yamil"}], "video": null}]}, {"year": "2023", "color": "#79408d", "label_es": "Reforma inconstitucional", "label_en": "Unconstitutional reform", "intro_es": "El 2023 estuvo marcado por un fuerte conflicto social, político e institucional a partir de una reforma de la constitución provincial que restringía el derecho a la protesta y la propiedad comunitaria de la tierra. La defensa del territorio, el agua y los derechos humanos toman un rol protagónico dentro de la Fundación.", "intro_en": "2023 was marked by intense social, political and institutional conflict over a provincial constitutional reform that restricted the right to protest and communal land ownership. The defense of territory, water and human rights took center stage for the Foundation.", "items": [{"t_es": "Verónica Chávez y James Cameron", "t_en": "Verónica Chávez and James Cameron", "sub_es": "", "sub_en": "", "text_es": "Con el acompañamiento de Fundación Puna, Verónica Chávez, representante de la Comunidad Santuario Tres Pozos, se reunió en Buenos Aires con el cineasta y activista ambiental James Cameron, y expuso de primera mano cómo el avance de la extracción de litio afecta los territorios, el acceso al agua y las formas de vida en la Puna. Victoria Araya participó como traductora, proyectando la voz de la comunidad a escala internacional.", "text_en": "With Fundación Puna's support, Verónica Chávez, representative of the Santuario Tres Pozos community, met in Buenos Aires with filmmaker and environmental activist James Cameron, and showed first-hand how the advance of lithium extraction affects the territories, water access and ways of life in the Puna. Victoria Araya took part as translator, projecting the community's voice on an international scale.", "photos": [{"u": "assets/2023-cameron__2.jpg", "es": "Verónica Chávez con James Cameron", "en": "Verónica Chávez with James Cameron"}, {"u": "assets/2023-cameron__1.jpg", "es": "Verónica Chávez con James Cameron", "en": "Verónica Chávez with James Cameron"}, {"u": "assets/2023-cameron__3.jpg", "es": "Reunión con Victoria Araya como traductora", "en": "Meeting with Victoria Araya as translator"}, {"u": "assets/2023-cameron__4.jpg", "es": "Verónica Chávez con Victoria Araya en Aeroparque", "en": "Verónica Chávez with Victoria Araya at Aeroparque"}, {"u": "assets/2023-cameron__5.jpg", "es": "Recorte de noticia", "en": "News clipping"}], "video": null, "loc": {"lat": -34.6, "lon": -58.38, "es": "Buenos Aires", "en": "Buenos Aires"}}, {"t_es": "Corte y permanencia en Purmamarca", "t_en": "Blockade and encampment in Purmamarca", "sub_es": "", "sub_en": "", "text_es": "En junio, en Purmamarca, tuvo lugar uno de los episodios más significativos: el corte y permanencia en la Ruta Nacional 9, que duró más de dos meses. Comunidades indígenas, docentes y trabajadores se manifestaron en defensa de sus derechos y la respuesta estatal fue represiva, con balas de goma, gases lacrimógenos y detenciones constantes. Fundación Puna acompañó de cerca a muchas de las víctimas ofreciendo apoyo económico y logístico.", "text_en": "In June, in Purmamarca, one of the most significant episodes took place: the blockade and encampment on National Route 9, which lasted more than two months. Indigenous communities, teachers and workers demonstrated in defense of their rights and the state response was repressive, with rubber bullets, tear gas and constant detentions. Fundación Puna accompanied many of the victims with financial and logistical support.", "photos": [{"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__9b3f8a62-e2ca-4605-89c6-16b8da8b6eb8.jpg", "es": "Corte y permanencia en Purmamarca", "en": "Blockade and encampment in Purmamarca"}, {"u": "assets/2023-cruce-de-purmamarca__img-7113.jpg", "es": "Victoria Araya en la posta de salud del corte de Purmamarca", "en": "Victoria Araya at the blockade's first-aid post"}, {"u": "assets/2023-cruce-de-purmamarca__img-5171.jpg", "es": "Victoria Araya en el corte de Purmamarca", "en": "Victoria Araya at the Purmamarca blockade"}, {"u": "assets/2023-cruce-de-purmamarca__img-20230701-wa0352.jpg", "es": "Mural en la Ruta Nacional 9", "en": "Mural on National Route 9"}, {"u": "assets/2023-cruce-de-purmamarca__img-7302.jpg", "es": "Corte y permanencia en Purmamarca", "en": "Blockade and encampment in Purmamarca"}, {"u": "assets/2023-cruce-de-purmamarca__img-7309.jpg", "es": "Jeremy Munson en el corte de Purmamarca", "en": "Jeremy Munson at the Purmamarca blockade"}], "video": null, "loc": {"lat": -23.745, "lon": -65.5, "es": "Purmamarca, Jujuy", "en": "Purmamarca, Jujuy"}}, {"t_es": "Apoyo ante la represión — Lian Lamas", "t_en": "Support amid the repression — Lian Lamas", "sub_es": "", "sub_en": "", "text_es": "La violencia estatal dejó heridas físicas y emocionales profundas. Entre los casos más graves se encuentran Lian Lamas, un joven de 17 años que perdió un ojo tras recibir un disparo policial, y Joel Paredes, quien también sufrió daños irreparables. Frente a estas situaciones, Fundación Puna acompañó a las víctimas ofreciendo apoyo económico y logístico, y dando hospedaje en Buenos Aires para sus consultas médicas.", "text_en": "State violence left deep physical and emotional wounds. Among the gravest cases are Lian Lamas, a 17-year-old who lost an eye after a police shot, and Joel Paredes, who also suffered irreparable damage. In response, Fundación Puna accompanied the victims with financial and logistical support, and hosted them in Buenos Aires for their medical care.", "photos": [{"u": "assets/2023-lian-lamas__img-8362.jpg", "es": "Lian Lamas", "en": "Lian Lamas"}, {"u": "assets/2023-lian-lamas__img-7865.jpg", "es": "Lian Lamas en la casa de Fundación Puna en Buenos Aires", "en": "Lian Lamas at Fundación Puna's house in Buenos Aires"}, {"u": "assets/2023-lian-lamas__b73d1497-0b61-408b-8388-d77a2c226fcf.jpg", "es": "Lian Lamas con Estela de Carlotto", "en": "Lian Lamas with Estela de Carlotto"}], "video": null, "loc": {"lat": -34.6, "lon": -58.38, "es": "Buenos Aires", "en": "Buenos Aires"}}, {"t_es": "Tercer Malón de la Paz", "t_en": "Third Malón de la Paz", "sub_es": "", "sub_en": "", "text_es": "Frente a la gravedad de la situación, más de 400 comunidades originarias se organizaron en el Tercer Malón de la Paz, una movilización histórica que recorrió más de 1.800 km desde La Quiaca hasta Buenos Aires para llevar el reclamo a la Corte Suprema de Justicia. Yamil Alejo asumió un rol de liderazgo entre los jóvenes del movimiento. Fundación Puna colaboró en la logística, el apoyo en la posta de salud y la visibilización del conflicto a nivel nacional e internacional.", "text_en": "Given the gravity of the situation, more than 400 Indigenous communities organized the Third Malón de la Paz, a historic mobilization that traveled over 1,800 km from La Quiaca to Buenos Aires to bring their claim to the Supreme Court of Justice. Yamil Alejo took on a leadership role among the movement's youth. Fundación Puna supported logistics, the first-aid post and national and international visibility of the conflict.", "photos": [{"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0065.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0075.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-20230729-wa0077.jpg", "es": "El Tercer Malón de la Paz en Buenos Aires", "en": "The Third Malón de la Paz in Buenos Aires"}, {"u": "assets/2023-tercer-malon-de-la-paz-en-buenos-aires-yamil__img-4358.jpg", "es": "Yamil Alejo en el Tercer Malón de la Paz", "en": "Yamil Alejo at the Third Malón de la Paz"}], "video": null, "loc": {"lat": -34.6, "lon": -58.38, "es": "Buenos Aires", "en": "Buenos Aires"}}]}, {"year": "2024", "color": "#9e69b1", "label_es": "Lucha, cultura y crecimiento", "label_en": "Struggle, culture and growth", "intro_es": "Una etapa de mayor consolidación que combina el trabajo territorial con la articulación política, el fortalecimiento cultural y nuevas iniciativas. La educación continúa como eje, con clases de inglés y espacios vinculados a derechos humanos.", "intro_en": "A stage of greater consolidation combining territorial work with political articulation, cultural strengthening and new initiatives. Education remains a core axis, with English classes and human-rights spaces.", "items": [{"t_es": "En las calles", "t_en": "In the streets", "sub_es": "", "sub_en": "", "text_es": "En enero, Fundación Puna reafirma su compromiso con las comunidades de Salinas Grandes acompañando al Tercer Malón de la Paz en el rechazo al DNU 70/2023 impulsado por el gobierno nacional. La participación en movilizaciones y espacios de protesta forma parte de una continuidad en la defensa de derechos, especialmente en relación con el territorio, el agua y las condiciones de vida de las comunidades.", "text_en": "In January, Fundación Puna reaffirms its commitment to the Salinas Grandes communities by accompanying the Third Malón de la Paz in rejecting the national government's Decree 70/2023. Taking part in mobilizations and protests is part of a continuity in defending rights, especially around territory, water and the communities' living conditions.", "photos": [{"u": "assets/2024-marca-24-de-enero__img-3427.jpg", "es": "Victoria Araya y Yamil Alejo en la marcha en San Salvador de Jujuy", "en": "Victoria Araya and Yamil Alejo at the march in San Salvador de Jujuy"}, {"u": "assets/2024-marca-24-de-enero__img-3440.jpg", "es": "Reunión de Fundación Puna con miembros del Tercer Malón de la Paz", "en": "Fundación Puna meeting with members of the Third Malón de la Paz"}], "video": null, "loc": {"lat": -24.185, "lon": -65.297, "es": "San Salvador de Jujuy", "en": "San Salvador de Jujuy"}}, {"t_es": "Cumbre del Agua", "t_en": "Water Summit", "sub_es": "", "sub_en": "", "text_es": "La defensa del agua se consolida como una prioridad. En marzo, Fundación Puna participa en la Cumbre del Agua, un espacio de encuentro entre comunidades originarias, especialistas y activistas, donde se comparten estrategias para proteger los recursos hídricos frente al avance de políticas extractivas.", "text_en": "The defense of water consolidates as a priority. In March, Fundación Puna takes part in the Water Summit, a gathering of Indigenous communities, specialists and activists where strategies are shared to protect water resources against the advance of extractive policies.", "photos": [], "video": null, "loc": {"lat": -24.185, "lon": -65.297, "es": "San Salvador de Jujuy", "en": "San Salvador de Jujuy"}}, {"t_es": "Cultura en comunidad", "t_en": "Culture in community", "sub_es": "", "sub_en": "", "text_es": "La cultura y el vínculo con las comunidades ocupan un lugar central. En febrero, el equipo participa del desentierro de carnaval en la comunidad de Angosto El Pérchel, una ceremonia ancestral que marca el inicio del carnaval andino y refuerza la conexión con la tierra y la vida comunitaria. Además, Fundación Puna visita nuevamente a la comunidad de Rinconadillas.", "text_en": "Culture and the bond with the communities take a central place. In February, the team takes part in the carnival 'unearthing' in the community of Angosto El Pérchel, an ancestral ceremony that marks the start of the Andean carnival and reinforces the connection with the land and community life. Fundación Puna also visits the Rinconadillas community again.", "photos": [{"u": "assets/2024-rinconadillas-2024__img-7540.jpg", "es": "Paisaje de la Puna jujeña", "en": "Landscape of the Jujuy Puna"}, {"u": "assets/2024-rinconadillas-2024__img-7675.jpg", "es": "Desentierro de carnaval en Angosto El Pérchel", "en": "Carnival 'unearthing' in Angosto El Pérchel"}, {"u": "assets/2024-rinconadillas-2024__img-9087.jpg", "es": "Carnaval andino", "en": "Andean carnival"}, {"u": "assets/2024-rinconadillas-2024__img-7593.jpg", "es": "Visita a la comunidad de Rinconadillas", "en": "Visit to the Rinconadillas community"}], "video": null, "loc": {"lat": -23.78, "lon": -65.45, "es": "Angosto El Pérchel, Jujuy", "en": "Angosto El Pérchel, Jujuy"}}, {"t_es": "Activismo ambiental con Carola Rackete y Bojana Novakovic", "t_en": "Environmental activism with Carola Rackete and Bojana Novakovic", "sub_es": "", "sub_en": "", "text_es": "Hacia octubre, la dimensión internacional vuelve a tomar fuerza con la visita de la eurodiputada Carola Rackete y la actriz y activista serbia Bojana Novakovic, quienes recorren la región y se vinculan con las comunidades en el marco de sus agendas de activismo ambiental. Su presencia aporta visibilidad y un gesto de acompañamiento que refuerza la importancia de las redes globales en la defensa del territorio.", "text_en": "Toward October, the international dimension gains strength again with the visit of MEP Carola Rackete and the Serbian actress and activist Bojana Novakovic, who tour the region and connect with the communities as part of their environmental-activism agendas. Their presence brings visibility and a gesture of solidarity that reinforces the importance of global networks in defending the territory.", "photos": [{"u": "assets/2024-carola-y-bojana__img-7781.jpg", "es": "Victoria Araya y Verónica Chávez con Bojana Novakovic en las Salinas", "en": "Victoria Araya and Verónica Chávez with Bojana Novakovic at the Salinas"}, {"u": "assets/2024-carola-y-bojana__img-7737.jpg", "es": "Fundación Puna con Carola Rackete, Bojana Novakovic y miembros en la Cuenca de Salinas Grandes", "en": "Fundación Puna with Carola Rackete, Bojana Novakovic and members in the Salinas Grandes basin"}, {"u": "assets/2024-carola-y-bojana__img-7839.jpg", "es": "Salinas Grandes", "en": "Salinas Grandes"}, {"u": "assets/2024-carola-y-bojana__img-7753.jpg", "es": "Recorrido junto a las comunidades", "en": "Touring alongside the communities"}, {"u": "assets/2024-carola-y-bojana__img-9238.jpg", "es": "Salinas Grandes", "en": "Salinas Grandes"}], "video": null, "loc": {"lat": -23.62, "lon": -65.8, "es": "Salinas Grandes, Jujuy", "en": "Salinas Grandes, Jujuy"}}]}, {"year": "2025", "color": "#6492d8", "label_es": "Expansión y articulación internacional", "label_en": "International expansion and alliances", "intro_es": "El año de la proyección internacional y la intervención judicial. La Fundación llevó reclamos socioambientales al Parlamento Europeo y sumó alianzas clave con organismos de derechos humanos como el SERPAJ, mientras diversificaba el trabajo territorial hacia la salud comunitaria y la universidad pública.", "intro_en": "The year of international projection and judicial intervention. The Foundation brought socio-environmental claims to the European Parliament and forged key alliances with human-rights bodies such as SERPAJ, while diversifying territorial work toward community health and the public university.", "items": [{"t_es": "Cumbre de Energías Limpias · Parlamento Europeo", "t_en": "Clean Energy Summit · European Parliament", "sub_es": "", "sub_en": "", "text_es": "Fundación Puna gestiona la participación de referentes comunitarios en una cumbre sobre energías limpias en el Parlamento Europeo: Verónica Chávez (cuenca de Salinas Grandes, Jujuy), Ñushpi Quilla Mayhuay Alancay (Malargüe, Mendoza) y Sergio Martínez (Andalgalá). Cada uno lleva una realidad distinta atravesada por un mismo eje: la defensa del agua y del territorio frente al avance extractivo, poniendo en el centro del debate las tensiones entre el discurso de las energías 'limpias' y sus impactos concretos en los territorios. Sol Felicitas Araya, del área de comunicación, realiza un informe audiovisual que reúne testimonios e imágenes del territorio para amplificar estas voces.", "text_en": "Fundación Puna arranges the participation of community leaders in a clean-energy summit at the European Parliament: Verónica Chávez (Salinas Grandes basin, Jujuy), Ñushpi Quilla Mayhuay Alancay (Malargüe, Mendoza) and Sergio Martínez (Andalgalá). Each brings a distinct reality tied to a shared axis: the defense of water and territory against extractive expansion, bringing to the center of the debate the tensions between the discourse of 'clean' energy and its concrete impacts. Sol Felicitas Araya, from communications, produces a short film gathering testimonies and images of the territory to amplify these voices.", "photos": [{"u": "assets/2025__img-1995.jpg", "es": "Ñushpi y Victoria en el Parlamento Europeo", "en": "Ñushpi and Victoria at the European Parliament"}, {"u": "assets/2025__img-1978.jpg", "es": "Ñushpi, Verónica y Victoria en el Parlamento Europeo con Carola Rackete", "en": "Ñushpi, Verónica and Victoria at the European Parliament with Carola Rackete"}, {"u": "assets/2025__img-1963.jpg", "es": "Verónica y Victoria en el Parlamento Europeo", "en": "Verónica and Victoria at the European Parliament"}, {"u": "assets/2025__img-1926.jpg", "es": "Ñushpi, Verónica y Victoria en Europa", "en": "Ñushpi, Verónica and Victoria in Europe"}, {"u": "assets/2025__img-0686.jpg", "es": "Victoria y Jeremy con Verónica en Europa", "en": "Victoria and Jeremy with Verónica in Europe"}], "video": null, "loc": {"lat": 50.8503, "lon": 4.3517, "es": "Bruselas, Europa", "en": "Brussels, Europe"}, "links": [{"es": "Denunciando en Europa desastres extractivistas en nuestro país", "en": "Denouncing our country's extractivist disasters, in Europe", "src": "argentina.indymedia.org", "url": "https://argentina.indymedia.org/2025/05/23/denunciando-en-europa-desastres-extractivistas-en-nuestro-pais/"}]}, {"t_es": "Alianza con el SERPAJ", "t_en": "Alliance with SERPAJ", "sub_es": "", "sub_en": "", "text_es": "En paralelo, Fundación Puna firma un convenio de trabajo con el Servicio Paz y Justicia (SERPAJ), organización fundada por Adolfo Pérez Esquivel. Este acuerdo fortalece una línea de acción orientada a la cooperación en conflictos territoriales, ampliando las redes de articulación y consolidando un perfil más internacionalista.", "text_en": "In parallel, Fundación Puna signs a working agreement with Servicio Paz y Justicia (SERPAJ), the organization founded by Adolfo Pérez Esquivel. This agreement strengthens a line of action oriented to cooperation on territorial conflicts, expanding networks and consolidating a more internationalist profile.", "photos": [{"u": "assets/2025__img-3912.jpg", "es": "Victoria Araya con Adolfo Pérez Esquivel", "en": "Victoria Araya with Adolfo Pérez Esquivel"}, {"u": "assets/2025__img-3846.jpg", "es": "Victoria Araya con los miembros del SERPAJ", "en": "Victoria Araya with the members of SERPAJ"}, {"u": "assets/2025__img-3923.jpg", "es": "Firma del convenio entre Fundación Puna y SERPAJ", "en": "Signing of the agreement between Fundación Puna and SERPAJ"}], "video": null, "loc": {"lat": -34.6, "lon": -58.38, "es": "Buenos Aires", "en": "Buenos Aires"}}, {"t_es": "Jornadas de Plantas Medicinales", "t_en": "Medicinal Plants gatherings", "sub_es": "", "sub_en": "", "text_es": "Los pasados 9 y 10 de octubre, las instalaciones del Club Vial 6 fueron sede de las 1ras Jornadas de Cannabis y Plantas Medicinales de la provincia —organizadas junto al programa de radio cannábico 'La Rama que Llama'—, un importante espacio de encuentro, debate e intercambio de conocimientos, libre y gratuito. El evento marcó un hito al ser declarado de interés legislativo, un reconocimiento que subraya la urgencia y la relevancia de abordar esta temática de forma seria, interdisciplinaria y abierta a la comunidad. La iniciativa contó con el acompañamiento de la Universidad Nacional de Jujuy (UNJu): se destacó la presencia de autoridades institucionales, con la participación especial de la Dra. en Antropología Liliana Bergessio, reafirmando el compromiso de la universidad pública con espacios académicos que promuevan el pensamiento crítico y el abordaje de temáticas de impacto social.", "text_en": "On October 9–10, the Club Vial 6 hosted the province's 1st Cannabis and Medicinal Plants Conference —organized together with the cannabis radio program 'La Rama que Llama'— a major, free and open space for gathering, debate and knowledge-sharing. The event was a milestone, declared of legislative interest, a recognition that underscores the urgency and relevance of addressing this topic seriously, across disciplines and open to the community. The initiative was accompanied by the National University of Jujuy (UNJu): institutional authorities took part, notably Dr. Liliana Bergessio (Anthropology), reaffirming the public university's commitment to academic spaces that foster critical thinking and socially impactful themes.", "photos": [{"u": "assets/2025-jornadas__1-20251007-020045-0000.jpg", "es": "1ras Jornadas de Cannabis y Plantas Medicinales — Club Vial 6 (9–10 de octubre 2025)", "en": "1st Cannabis & Medicinal Plants Conference — Club Vial 6 (Oct 9–10, 2025)"}, {"u": "assets/2025-jornadas__3-20251007-020045-0002.jpg", "es": "1ras Jornadas de Cannabis y Plantas Medicinales — Club Vial 6 (9–10 de octubre 2025)", "en": "1st Cannabis & Medicinal Plants Conference — Club Vial 6 (Oct 9–10, 2025)"}, {"u": "assets/2025-jornadas__flyer-jornadas.jpg", "es": "1ras Jornadas de Cannabis y Plantas Medicinales — Club Vial 6 (9–10 de octubre 2025)", "en": "1st Cannabis & Medicinal Plants Conference — Club Vial 6 (Oct 9–10, 2025)"}], "video": null, "loc": {"lat": -24.185, "lon": -65.297, "es": "San Salvador de Jujuy", "en": "San Salvador de Jujuy"}}, {"t_es": "Amicus Curiae en el caso de la niña Cielo", "t_en": "Amicus Curiae in the case of the child Cielo", "sub_es": "", "sub_en": "", "text_es": "Fundación Puna articuló una red de organizaciones nacionales e internacionales de derechos humanos, que incluyó al Cyrus R. Vance Center for International Justice (NYC Bar Association) y al Servicio Paz y Justicia (SERPAJ). Esta alianza estratégica intervino institucionalmente mediante la figura de Amicus Curiae en el caso de la niña Cielo (Chaco), promoviendo la correcta aplicación de los estándares de protección de la niñez y la perspectiva de género ante el sistema judicial argentino.", "text_en": "Fundación Puna convened a network of national and international human-rights organizations, including the Cyrus R. Vance Center for International Justice (NYC Bar Association) and Servicio Paz y Justicia (SERPAJ). This strategic alliance intervened institutionally through the figure of Amicus Curiae in the case of the child Cielo (Chaco), promoting the correct application of child-protection standards and a gender perspective before the Argentine judicial system.", "photos": [], "video": null, "loc": {"lat": -27.45, "lon": -58.98, "es": "Chaco", "en": "Chaco"}}]}];
let LANG='es', activeYear=YEARS[0].year;
const tabsEl=document.getElementById('tabs'), body=document.getElementById('ybody');
let timers=[];
function clearTimers(){timers.forEach(t=>clearInterval(t));timers=[];}
function carouselHTML(it,cid){
  const slides=it.photos.map(p=>`<figure class="slide"><img loading="lazy" src="${p.u}" alt="${(p[LANG]||'').replace(/"/g,'&quot;')}"></figure>`).join('');
  const multi=it.photos.length>1;
  return `<div class="carousel" id="${cid}"><div class="track">${slides}</div>`+
    (multi?`<button class="cbtn prev">‹</button><button class="cbtn next">›</button>`:'')+`</div>`+
    (multi?`<div class="cbar"><span class="ccounter"><span id="${cid}_cur">1</span>/${it.photos.length}</span></div>`:'');
}
function videoHTML(it){
  if(!it.video) return '';
  return `<div class="vid"><video src="${it.video.u}" controls playsinline preload="metadata"></video>`+
         `<div class="vcap">▶ ${it.video[LANG]}</div></div>`;
}
function linksHTML(it){
  if(!it.links||!it.links.length) return '';
  return `<div class="mlinks"><span class="mlinks-h">${LANG==='es'?'En la prensa':'In the press'}</span>`+
    it.links.map(a=>`<a class="mlink" href="${a.url}" target="_blank" rel="noopener">↗ ${a[LANG]} <span class="mlsrc">· ${a.src}</span></a>`).join('')+`</div>`;
}
function renderYear(){
  const y=YEARS.find(x=>x.year===activeYear);
  document.documentElement.style.setProperty('--yc',y.color);
  tabsEl.querySelectorAll('button').forEach(b=>{const on=b.dataset.y===activeYear;
    b.style.background=on?y.color:'var(--card)';b.style.color=on?'#fff':'var(--fg)';b.style.borderColor=on?'transparent':'var(--border)';});
  let html=`<div class="yhead" style="--yc:${y.color}"><div class="ynum">${y.year}</div><div class="ylabel">${y['label_'+LANG]}</div></div>`+
           `<p class="yintro">${y['intro_'+LANG]||''}</p>`;
  if(!y.items.length){
    html+=`<div class="soon"><span class="soon-badge" style="background:${y.color}">${LANG==='es'?'Próximamente':'Coming soon'}</span></div>`;
  }
  y.items.forEach((it,idx)=>{const cid=`c_${y.year}_${idx}`; const hasPh=it.photos.length>0;
    html+=`<div class="chapter${hasPh?'':' solo'}" style="--yc:${y.color}"><div class="txt">`+
      (it['sub_'+LANG]?`<div class="isub">${it['sub_'+LANG]}</div>`:`<div class="isub">${y.year}</div>`)+
      `<h3>${it['t_'+LANG]}</h3><p>${it['text_'+LANG]}</p>${linksHTML(it)}${videoHTML(it)}</div>`+
      (hasPh?`<div>${carouselHTML(it,cid)}</div>`:'')+`</div>`;});
  clearTimers();
  body.innerHTML=html;
  y.items.forEach((it,idx)=>{if(it.photos.length>1)initCarousel(`c_${y.year}_${idx}`, it.photos.length);});
  window.scrollTo({top:0});
}
function initCarousel(id,n){
  const el=document.getElementById(id); if(!el||n<=1) return;
  const track=el.querySelector('.track');
  const cur=document.getElementById(id+'_cur');
  let i=0;
  const go=k=>{i=(k+n)%n;track.style.transform=`translateX(${-i*100}%)`;if(cur)cur.textContent=i+1;};
  el.querySelector('.next').onclick=()=>go(i+1);
  el.querySelector('.prev').onclick=()=>go(i-1);
}
function buildTabs(){
  tabsEl.innerHTML=YEARS.map(y=>`<button data-y="${y.year}">${y.year}</button>`).join('');
  tabsEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{activeYear=b.dataset.y;renderYear();});
}
function setLang(l){LANG=l;document.documentElement.lang=l;
  document.querySelectorAll('[data-es]').forEach(el=>{const v=el.getAttribute('data-'+l);if(v!==null)el.textContent=v;});
  document.querySelectorAll('.toggle button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  renderYear();
}
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
buildTabs(); renderYear();
</script></body></html>
